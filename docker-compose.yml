version: '3.8'

services:
  #1. The local postgresSQL Database
  postgres_db:
    image: postgres:15-alpine
    container_name: dvd_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: local_password_123
      POSTGRES_DB: dvd_rental
    ports:
      - "5432:5432"
    volumes:
      - pgdata: /var/lib/postgresql/data

    #2. The Express Backend
    backend:
      build: ./server
      container_name: dvd_backend
      environment:
        PORT: 5000
        DATABASE_URL: postgresql://admin:local_password_123@postgres_db:5432/dvd_rental
        JWT_SECRET: docker_local_secret_key
      depends_on:
        - postgres_db

      # 3. The React Frontend
      frontend:
        build: ./client
        container_name: dvd_frontend
        depends_on:
          - backend

        # 4. The NIGNX Proxy (The Single Port Gateway)
        proxy:
            image: nginx:alpine
            container_name: dvd_proxy
            ports:
              - "80:80"
            volumes:
              - ./nginx.conf:/etc/nginx/nginx.conf:ro
            depends_on:
              - frontend
              - backend

volumes:
  pgdata:
